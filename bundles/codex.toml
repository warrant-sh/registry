[bundle]
name = "codex"
description = "OpenAI Codex CLI"
version = "1.0.0"

[setup]
guard_all_sessions = false
shell_guard = true
prompt_lock = true

[[agents]]
name = "codex"
alias = "codex"

[manifests]
include = [
  "warrant-sh/coreutils",
  "warrant-sh/git",
  "warrant-sh/npm",
  "warrant-sh/pip",
  "warrant-sh/codex",
  "warrant-sh/dangerous-patterns",
  "warrant-sh/sanitize-env",
]
