[manifest]
schema = "warrant.manifest.v1"
id = "warrant-sh/python"
tool = "python"
tool_version = ">=3.8"
manifest_version = "1.0.0"
summary = "Python interpreter and common development tools"
license = "CC0-1.0"
source = "https://www.python.org/"

[transforms]
supported = ["literal", "path", "glob"]

[tool_policy]
allow_inline_execution = true
package_policy = "denylist"
package_ecosystem = "pypi"
package_scope = "packages"
strip_env = [
  "PYTHONSTARTUP",
  "PYTHONPATH",
  "PYTHONHOME",
  "PYTHONINSPECT",
  "PYTHONUSERBASE",
  "PYTHONEXECUTABLE",
  "PIP_INDEX_URL",
  "PIP_EXTRA_INDEX_URL",
  "PIP_TRUSTED_HOST",
  "PIP_CONFIG_FILE",
]

# ── Interpreters ─────────────────────────────────

[[commands]]
match = ["--help"]
capability = "python.help"
description = "Show CLI help and usage information"
risk = "low"
default = "allow"

[[commands]]
match = ["-h"]
capability = "python.help"
description = "Show CLI help and usage information"
risk = "low"
default = "allow"

[[commands]]
match = ["help"]
capability = "python.help"
description = "Show CLI help and usage information"
risk = "low"
default = "allow"

[[commands]]
match = ["--version"]
capability = "python.version"
description = "Show CLI version information"
risk = "low"
default = "allow"

[[commands]]
match = ["-V"]
capability = "python.version"
description = "Show CLI version information"
risk = "low"
default = "allow"

[[commands]]
match = ["version"]
capability = "python.version"
description = "Show CLI version information"
risk = "low"
default = "allow"

[[commands]]
match = ["python3", "-m", "http.server"]
capability = "interpreter.python3_http_server"
description = "Run Python's built-in HTTP server module"
risk = "high"
default = "deny"

[[commands]]
match = ["python3", "-m", "SimpleHTTPServer"]
capability = "interpreter.python3_simple_http_server"
description = "Run Python's legacy built-in HTTP server module"
risk = "high"
default = "deny"

[[commands]]
match = ["python3"]
capability = "interpreter.python3"
description = "Run the Python 3 interpreter"
risk = "high"
default = "allow"

[[commands]]
match = ["python"]
capability = "interpreter.python"
description = "Run the Python interpreter"
risk = "high"
default = "allow"

# ── Package & environment management ─────────────

[[commands]]
match = ["pip3"]
capability = "python.pip3"
description = "Python 3 package installer"
risk = "moderate"
default = "allow"

[[commands]]
match = ["python3", "-m", "pip", "install"]
capability = "python.pip_install"
description = "Install Python packages through pip module execution"
risk = "moderate"
default = "allow"
scope = { key = "packages", from = "arg_rest", transform = "literal" }
options = { index = { names = ["-i", "--index-url"], forms = ["separate", "equals", "attached"] }, extra_index = { names = ["--extra-index-url"], forms = ["separate", "equals"] }, requirements = { names = ["-r", "--requirement"], forms = ["separate", "equals", "attached"] } }
scope_examples = { packages = ["requests", "uvicorn"], index = ["https://pypi.org/simple", "https://pypi.example.com/simple"], extra_index = ["https://download.pytorch.org/whl/cu121"], requirements = ["requirements.txt", "./req/prod.txt"] }
scope_descriptions = { packages = "Which packages to install", index = "Primary package index URL", extra_index = "Additional package index URLs", requirements = "Requirements file to install from" }

[[commands]]
match = ["pipx"]
capability = "python.pipx"
description = "Install and run Python applications in isolated environments"
risk = "moderate"
default = "allow"

[[commands]]
match = ["virtualenv"]
capability = "python.virtualenv"
description = "Create isolated Python environments"
risk = "low"
default = "allow"

[[commands]]
match = ["poetry"]
capability = "python.poetry"
description = "Python dependency management and packaging"
risk = "moderate"
default = "allow"

[[commands]]
match = ["pdm"]
capability = "python.pdm"
description = "Python package and dependency manager"
risk = "moderate"
default = "allow"

[[commands]]
match = ["uv"]
capability = "python.uv"
description = "Fast Python package installer and resolver"
risk = "moderate"
default = "allow"

[[commands]]
match = ["conda"]
capability = "python.conda"
description = "Conda package and environment manager"
risk = "moderate"
default = "allow"

